name: Sync Issues to ISSUES.md

on:
  issues:
    types: [opened, edited, closed, reopened, deleted, labeled, unlabeled]
  schedule:
    # Daily sync at 06:00 UTC as catch-all
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: write
  issues: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GitHub CLI
        run: gh --version

      - name: Run sync script
        run: |
          bash .github/scripts/sync-issues.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openspec/changes/makmur-0/ISSUES.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync ISSUES.md with GitHub Issues [skip ci]"
            git push
          fi
